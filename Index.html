<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowState · Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">FlowState</div>
        <div class="nav-links">
            <a href="index.html" class="active">Dashboard</a>
            <a href="inbox.html">Inbox</a>
            <span class="user">Sarah 👩‍🎨</span>
        </div>
    </nav>

    <main class="dashboard">
        <h1>Mission Control</h1>

        <!-- Two‑column layout -->
        <div class="dashboard-grid">
            <!-- Left: AI Workbench -->
            <section class="workbench">
                <h2>⚡ AI Workbench</h2>
                <p class="label">Paste your project details or email thread here to start.</p>
                <textarea id="projectInput" placeholder="e.g. Logo design for Joe Bloggs, $500, due in 2 weeks ..."></textarea>
                <button id="generateBtn" class="primary">Generate with AI</button>

                <!-- Review Card (hidden until AI responds) -->
                <div id="reviewCard" class="review-card hidden">
                    <h3>Review draft</h3>
                    <div id="extractedData"></div>
                    <div class="card-actions">
                        <button id="approveBtn" class="secondary">Approve & Send</button>
                        <button id="editBtn">Edit</button>
                    </div>
                </div>
            </section>

            <!-- Right: Active Projects -->
            <section class="active-projects">
                <h2>📌 Active projects</h2>
                <div id="projectList" class="project-list">
                    <!-- Populated by JS -->
                </div>
            </section>
        </div>

        <!-- Recent Activity Feed -->
        <section class="activity">
            <h2>📋 Recent AI activity</h2>
            <ul id="activityFeed">
                <!-- Populated by JS -->
            </ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
